name: 🛡️ Cursor Security Fixer

on:
  schedule:
    - cron: '0 8 * * 1-5' # Roda às 08h de seg a sex
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: read
      security-events: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true
          cache_dependency_path: javascript/pnpm-lock.yaml
          package_json_file: javascript/package.json

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install JS dependencies
        working-directory: javascript
        run: pnpm install --no-frozen-lockfile

      - name: Dependabot API (diagnóstico)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DEPENDABOT_ALERTS_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${GH_DEPENDABOT_ALERTS_TOKEN:-}" ]; then
            export GH_TOKEN="${GH_DEPENDABOT_ALERTS_TOKEN}"
            echo "Usando secret GH_DEPENDABOT_ALERTS_TOKEN para a API de alertas."
          fi
          gh auth status
          REPO="${{ github.repository }}"
          echo "Repositório: ${REPO}"
          echo "GET /repos/${REPO}/dependabot/alerts (headers Accept + X-GitHub-Api-Version) ..."
          if ! gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/dependabot/alerts" \
            -f state=open \
            --jq 'length'; then
            echo "::error::Dependabot Alerts API falhou (404 costuma sumir com headers corretos; 403 = permissão no token ou política da org)."
            echo "Opcional: crie um PAT classic com scope security_events e salve como secret GH_DEPENDABOT_ALERTS_TOKEN."
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO}/dependabot/alerts" \
              -f state=open 2>&1 || true
            exit 1
          fi
          echo "Primeiros alertas:"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/dependabot/alerts" \
            -f state=open \
            --jq '.[:15] | map({n:.number,sev:.security_advisory.severity,eco:.dependency.package.ecosystem,pkg:.dependency.package.name,pth:.dependency.manifest_path})'

      - name: 🤖 Execute Cursor Fix Logic
        working-directory: javascript
        env:
          CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DEPENDABOT_ALERTS_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_VERSION: ${{ vars.GITHUB_API_VERSION }}
        run: node scripts/cursor-fixer.js