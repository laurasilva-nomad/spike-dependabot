name: Cursor Security Fixer

on:
  schedule:
    - cron: '0 8 * * 1-5' # Roda às 08:00 de segunda a sexta
  workflow_dispatch:
    inputs:
      package_root:
        description: 'Caminho relativo ao package.json (ex. javascript ou .)'
        required: false
        default: 'javascript'

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: read
    
    env:
      # Prioriza o PAT (Personal Access Token) para ler alertas, com fallback para o token do GitHub
      GH_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN || github.token }}
      SECURITY_PACKAGE_ROOT: ${{ github.event.inputs.package_root || vars.SECURITY_PACKAGE_ROOT || 'javascript' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Cache automático baseado no lockfile do subdiretório selecionado
          cache: 'npm'
          cache-dependency-path: '${{ env.SECURITY_PACKAGE_ROOT }}/package-lock.json'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Instalar dependências (Pnpm/Yarn/Npm)
        run: |
          set -euo pipefail
          cd "${SECURITY_PACKAGE_ROOT}"
          
          # Lógica de detecção do Gerenciador de Pacotes
          if [ -f pnpm-lock.yaml ] || [ -f "../../pnpm-workspace.yaml" ]; then
            corepack enable
            corepack prepare pnpm@9 --activate
            pnpm install --no-frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install
          else
            npm install
          fi

      - name: Execute Cursor Fix Logic
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          GH_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN || github.token }}
          NODE_ENV: test
        run: |
          # Executa o script localizado dentro da pasta javascript/scripts/
          node "${SECURITY_PACKAGE_ROOT}/scripts/cursor-fixer.js"