name: 🛡️ Cursor Security Fixer

on:
  schedule:
    - cron: '0 8 * * 1-5' # Roda às 08h de seg a sex
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: read
      security-events: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true
          cache_dependency_path: javascript/pnpm-lock.yaml
          package_json_file: javascript/package.json

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install JS dependencies
        working-directory: javascript
        run: pnpm install --frozen-lockfile

      - name: 🤖 Execute Cursor Fix Logic
        working-directory: javascript
        env:
          CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: node scripts/cursor-fixer.js