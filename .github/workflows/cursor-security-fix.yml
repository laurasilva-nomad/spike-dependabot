name: 🛡️ Cursor Security Fixer

on:
  schedule:
    - cron: '0 8 * * 1-5' # Roda às 08h de seg a sex
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: read
      security-events: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true
          cache_dependency_path: javascript/pnpm-lock.yaml
          package_json_file: javascript/package.json

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install JS dependencies
        working-directory: javascript
        run: pnpm install --no-frozen-lockfile

      - name: Dependabot API (diagnóstico)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          gh auth status
          echo "Repositório: ${{ github.repository }}"
          echo "Total alertas abertos (todas severidades/ecossistemas):"
          gh api "repos/${{ github.repository }}/dependabot/alerts" -f state=open --jq 'length'
          echo "Primeiros alertas (number, severity, ecosystem, manifest_path):"
          gh api "repos/${{ github.repository }}/dependabot/alerts" -f state=open --jq '.[:15] | map({n:.number,sev:.security_advisory.severity,eco:.dependency.package.ecosystem,pkg:.dependency.package.name,pth:.dependency.manifest_path})'

      - name: 🤖 Execute Cursor Fix Logic
        working-directory: javascript
        env:
          CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/cursor-fixer.js