name: 🛡️ Cursor Security Fixer

on:
  schedule:
    - cron: '0 8 * * 1-5' # Roda às 08h de seg a sex
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: read
      security-events: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          cache: true
          cache_dependency_path: javascript/pnpm-lock.yaml
          package_json_file: javascript/package.json

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install JS dependencies
        working-directory: javascript
        run: pnpm install --no-frozen-lockfile

      - name: Dependabot REST (diagnóstico)
        env:
          GH_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN }}
          GH_DEPENDABOT_ALERTS_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${GH_DEPENDABOT_ALERTS_TOKEN:-}" ]; then
            export GH_TOKEN="${GH_DEPENDABOT_ALERTS_TOKEN}"
            echo "Token: secret GH_DEPENDABOT_ALERTS_TOKEN."
          fi
          gh auth status
          REPO="${{ github.repository }}"
          REST_PATH="/repos/${REPO}/dependabot/alerts"
          REST_LIST="${REST_PATH}?state=open&per_page=100"
          echo "Padronização: UI (navegador) ≠ REST (gh api)."
          echo "  UI:  https://github.com/${REPO}/security/dependabot"
          echo "  REST GET (api.github.com): ${REST_PATH}"
          echo "Chamada: GET ${REST_LIST}"
          if ! gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${REST_LIST}" \
            --jq 'length'; then
            echo "::error::REST ${REST_PATH} falhou. /security/dependabot/alerts na web não existe (use a URL de UI acima). 403/404: permissão, Dependabot alerts desligado ou política da org. Secret opcional: GH_DEPENDABOT_ALERTS_TOKEN."
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${REST_LIST}" 2>&1 || true
            exit 1
          fi
          echo "Primeiros alertas:"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${REST_LIST}" \
            --jq '.[:15] | map({n:.number,sev:.security_advisory.severity,eco:.dependency.package.ecosystem,pkg:.dependency.package.name,pth:.dependency.manifest_path})'

      - name: 🤖 Execute Cursor Fix Logic
        working-directory: javascript
        env:
          CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN }}
          GH_DEPENDABOT_ALERTS_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_VERSION: ${{ vars.GITHUB_API_VERSION }}
        run: node scripts/cursor-fixer.js