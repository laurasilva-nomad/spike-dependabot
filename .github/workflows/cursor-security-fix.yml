name: Cursor Security Fixer

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      package_root:
        description: Caminho relativo ao package.json (ex. javascript ou .)
        required: false
        default: 'javascript'

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: read # Necessário para ler os alertas
    
    env:
      # Prioriza o PAT para alertas, mas permite fallback para o token padrão do job
      GH_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN || github.token }}
      SECURITY_PACKAGE_ROOT: ${{ github.event.inputs.package_root || vars.SECURITY_PACKAGE_ROOT || 'javascript' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Opcional: Cache de dependências para velocidade
          cache: 'npm'
          cache-dependency-path: '${{ env.SECURITY_PACKAGE_ROOT }}/package-lock.json'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Instalar dependências (Pnpm/Yarn/Npm)
        run: |
          set -euo pipefail
          cd "${SECURITY_PACKAGE_ROOT}"
          if [ -f pnpm-lock.yaml ] || [ -f "../../pnpm-workspace.yaml" ]; then
            corepack enable
            corepack prepare pnpm@9 --activate
            pnpm install --no-frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install
          else
            npm install
          fi

      - name: Execute Cursor Fix Logic
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          # Passando o token explicitamente para o script
          GH_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN || github.token }}
          NODE_ENV: test  # Exemplo: define ambiente de teste
          # Adicione aqui outras envs que seus testes exijam (API_KEY, DB_URL, etc)
        run: |
          # Ajuste o caminho abaixo conforme a localização real do seu script
          node "scripts/cursor-fixer.js"