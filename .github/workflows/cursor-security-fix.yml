name: 🛡️ Cursor Security Fixer

on:
  schedule:
    - cron: '0 8 * * 1-5' # Roda às 08h de seg a sex
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: read
      security-events: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: javascript/pnpm-lock.yaml

      - name: 🤖 Execute Cursor Fix Logic
        working-directory: javascript
        env:
          CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/cursor-fixer.js