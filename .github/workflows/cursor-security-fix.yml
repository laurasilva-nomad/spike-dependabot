name: Cursor Security Fixer

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      package_root:
        description: Caminho relativo ao package.json (ex. javascript ou .)
        required: false
        default: 'javascript'

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: read
      security-events: read
    env:
      GH_DEPENDABOT_ALERTS_TOKEN: ${{ secrets.GH_DEPENDABOT_ALERTS_TOKEN }}
      GH_REPO_TOKEN: ${{ github.token }}
      SECURITY_PACKAGE_ROOT: ${{ github.event.inputs.package_root || vars.SECURITY_PACKAGE_ROOT || 'javascript' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          package-manager-cache: false

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Instalar dependências (detecta npm, pnpm ou yarn pelo lockfile)
        env:
          ROOT: ${{ env.SECURITY_PACKAGE_ROOT }}
        run: |
          set -euo pipefail
          test -f "${ROOT}/package.json"
          cd "${ROOT}"
          if [ -f pnpm-lock.yaml ] || [ -f "${GITHUB_WORKSPACE}/pnpm-lock.yaml" ] || [ -f "${GITHUB_WORKSPACE}/pnpm-workspace.yaml" ]; then
            corepack enable
            corepack prepare pnpm@9 --activate
            pnpm install --no-frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install
          else
            npm install
          fi

      - name: Dependabot REST (diagnóstico)
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_DEPENDABOT_ALERTS_TOKEN:-${GH_REPO_TOKEN}}"
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_TOKEN vazio (job precisa de GH_REPO_TOKEN ou PAT)."
            exit 1
          fi
          if [ -n "${GH_DEPENDABOT_ALERTS_TOKEN:-}" ]; then echo "gh: PAT"; else echo "gh: GH_REPO_TOKEN"; fi
          gh auth status
          REPO="${{ github.repository }}"
          REST_PATH="/repos/${REPO}/dependabot/alerts"
          REST_LIST="${REST_PATH}?state=open&per_page=100"
          echo "UI: https://github.com/${REPO}/security/dependabot"
          echo "REST GET: ${REST_LIST}"
          if ! gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${REST_LIST}" \
            --jq 'length'; then
            echo "::error::REST ${REST_PATH} falhou. Confira permissões e secret GH_DEPENDABOT_ALERTS_TOKEN se necessário."
            exit 1
          fi
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${REST_LIST}" \
            --jq '.[:15] | map({n:.number,sev:.security_advisory.severity,eco:.dependency.package.ecosystem,pkg:.dependency.package.name,pth:.dependency.manifest_path})'

      - name: Execute Cursor Fix Logic
        env:
          CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          SECURITY_PACKAGE_ROOT: ${{ env.SECURITY_PACKAGE_ROOT }}
        run: |
          node "${GITHUB_WORKSPACE}/${SECURITY_PACKAGE_ROOT}/scripts/cursor-fixer.js"
